<div class="expenses-container">
  <h1>Registrar Gasto</h1>

  <div class="form-section">
    <div class="form-card">
      <h2>Nuevo Gasto</h2>
      
      <div class="form-row">
        <div class="form-group">
          <label>Descripción</label>
          <input 
            type="text" 
            [(ngModel)]="newExpense.description"
            placeholder="Descripción del gasto"
            class="form-input">
        </div>
        <div class="form-group">
          <label>Categoría</label>
          <select [(ngModel)]="newExpense.category" class="form-input">
            <option *ngFor="let cat of categories" [value]="cat.value">
              {{ cat.label }}
            </option>
          </select>
        </div>
        <div class="form-group">
          <label>Monto</label>
          <input 
            type="number" 
            [(ngModel)]="newExpense.amount"
            min="0"
            step="0.01"
            class="form-input">
        </div>
        <div class="form-group">
          <label>Fecha</label>
          <input 
            type="date" 
            [(ngModel)]="newExpense.date"
            class="form-input">
        </div>
        <button (click)="addExpense()" class="btn-add">
          <i class="pi pi-plus"></i> Agregar
        </button>
      </div>
    </div>
  </div>

  <div class="table-section" *ngIf="expenses.length > 0">
    <table class="expenses-table">
      <thead>
        <tr>
          <th>Descripción</th>
          <th>Categoría</th>
          <th>Monto</th>
          <th>Fecha</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let expense of expenses; let i = index">
          <td>{{ expense.description }}</td>
          <td>
            <span class="category-badge" [ngClass]="'cat-' + expense.category">
              {{ getCategoryLabel(expense.category) }}
            </span>
          </td>
          <td><strong>Q{{ expense.amount.toFixed(2) }}</strong></td>
          <td>{{ expense.date }}</td>
          <td>
            <button (click)="removeExpense(i)" class="btn-remove">
              <i class="pi pi-trash"></i>
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="total-summary">
      <h3>Total Gastos: <span>Q{{ totalExpenses.toFixed(2) }}</span></h3>
    </div>

    <button (click)="saveExpenses()" class="btn-save" [disabled]="isLoading">
      <i class="pi" [ngClass]="isLoading ? 'pi-spin pi-spinner' : 'pi-save'"></i>
      {{ isLoading ? 'Procesando...' : 'Guardar Gastos' }}
    </button>
  </div>

  <div class="empty-state" *ngIf="expenses.length === 0">
    <i class="pi pi-inbox"></i>
    <p>No hay gastos registrados. Agrega un gasto para comenzar.</p>
  </div>
</div>
