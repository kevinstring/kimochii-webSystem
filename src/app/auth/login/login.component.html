<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>Kimochii</h1>
      <p class="subtitle">Sistema de Control de Inventario</p>
    </div>

    <form class="login-form" (submit)="handleLogin(); $event.preventDefault()">
      <div class="form-group">
        <label for="userId">ID Usuario</label>
        <input
          type="text"
          id="userId"
          [(ngModel)]="userId"
          name="userId"
          placeholder="Ej: USR001"
          (keypress)="handleKeyPress($event)"
          autofocus
          class="form-input">
      </div>

      <div class="form-group">
        <label for="name">Nombre</label>
        <input
          type="text"
          id="name"
          [(ngModel)]="name"
          name="name"
          placeholder="Tu nombre completo"
          (keypress)="handleKeyPress($event)"
          class="form-input">
      </div>

      <div class="error-message" *ngIf="errorMessage">
        <i class="pi pi-exclamation-circle"></i> {{ errorMessage }}
      </div>

      <button type="submit" class="btn-login">
        <i class="pi pi-sign-in"></i> Iniciar Sesión
      </button>
    </form>

    <div class="login-footer">
      <p>Ingresa tus credenciales para acceder al sistema</p>
    </div>
  </div>
</div>
