<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>Kimochii</h1>
      <p class="subtitle">Sistema de Control de Inventario</p>
    </div>

    <form class="login-form" (submit)="handleLogin(); $event.preventDefault()">
      <div class="form-group">
        <label for="nickname">Usuario</label>
        <input
          type="text"
          id="nickname"
          [(ngModel)]="nickname"
          name="nickname"
          placeholder="Tu nickname"
          (keypress)="handleKeyPress($event)"
          autofocus
          class="form-input">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Tu contraseña"
          (keypress)="handleKeyPress($event)"
          class="form-input">
      </div>

      <div class="error-message" *ngIf="errorMessage">
        <i class="pi pi-exclamation-circle"></i> {{ errorMessage }}
      </div>

      <button type="submit" class="btn-login" [disabled]="isLoading">
        <i class="pi" [ngClass]="isLoading ? 'pi-spin pi-spinner' : 'pi-sign-in'"></i> 
        {{ isLoading ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
      </button>
    </form>

    <div class="login-footer">
      <p>Ingresa tus credenciales para acceder al sistema</p>
    </div>
  </div>
</div>
